name: Bug Report
description: Report a bug found in ArchTech Suite
title: '[BUG] '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: "## Bug Report\nThank you for helping improve ArchTech Suite."
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - P1 — Critical (system down, no workaround)
        - P2 — High (major feature broken, workaround exists)
        - P3 — Medium (minor feature issue)
        - P4 — Low (cosmetic)
    validations:
      required: true
  - type: dropdown
    id: squad
    attributes:
      label: Squad / Bounded Context
      options:
        - Platform / Core
        - CRM (Atendimento)
        - Proposals
        - Financeiro
        - Library (Suporte)
        - Permits
        - Suppliers
        - Facilities
        - BIM Twin
        - Client Portal
        - Frontend / UI
        - Infrastructure / DevOps
        - AI / Integration
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear and concise description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Numbered steps to reproduce the issue
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, environment (dev/staging/prod)
      value: |
        - Environment:
        - Browser:
        - OS:
        - Trace ID (if available):
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs/Screenshots
      description: Paste logs, error messages, or link to screenshots
