name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke Test (DDEV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, pdo_pgsql, redis

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1

      - name: Start DDEV
        run: ddev start

      - name: Install dependencies
        run: ddev composer install --no-interaction

      - name: Verify site builds
        run: |
          ddev drush core:status
          ddev drush cr

      - name: Infrastructure tests
        run: |
          # Install test tools
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" | tar xz -C /tmp/
          sudo cp /tmp/kubeconform /usr/local/bin/
          curl -sL "https://github.com/prometheus/prometheus/releases/download/v2.53.0/prometheus-2.53.0.linux-amd64.tar.gz" | tar xz -C /tmp/
          sudo cp /tmp/prometheus-2.53.0.linux-amd64/promtool /usr/local/bin/
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run YAML validation
        run: python3 scripts/validate-yaml.py

      - name: Run Kubernetes validation
        run: kubeconform -kubernetes-version 1.30.0 -strict infrastructure/kubernetes/namespaces/*.yaml infrastructure/kubernetes/rbac/*.yaml infrastructure/kubernetes/network-policies/*.yaml infrastructure/kubernetes/service-account.yaml

      - name: Run Prometheus validation
        run: |
          promtool check rules infrastructure/observability/prometheus/rules/archtech-alerts.yml
          promtool check config infrastructure/observability/prometheus/prometheus.yml

      - name: Run shellcheck
        run: shellcheck -x -S error scripts/*.sh scripts/tests/*.sh infrastructure/vault/scripts/*.sh

      - name: Check for critical errors in logs
        if: failure()
        run: ddev logs --tail=50

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e

  zap:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12
        with:
          target: 'http://archtech.ddev.site'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j'
          allow_issue_writing: false

  a11y-audit:
    name: Acessibilidade (axe-core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Run a11y audit
        run: npm run test:a11y
