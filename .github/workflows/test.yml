name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Smoke Test (DDEV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, pdo_pgsql, redis

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1

      - name: Start DDEV
        run: ddev start

      - name: Install dependencies
        run: ddev composer install --no-interaction

      - name: Verify site builds
        run: |
          ddev drush core:status
          ddev drush cr

      - name: Install infra validation tools
        run: |
          curl -sL "https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz" | tar xz -C /tmp/
          sudo cp /tmp/kubeconform /usr/local/bin/
          curl -sL "https://github.com/prometheus/prometheus/releases/download/v2.53.0/prometheus-2.53.0.linux-amd64.tar.gz" | tar xz -C /tmp/
          sudo cp /tmp/prometheus-2.53.0.linux-amd64/promtool /usr/local/bin/
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Validate YAML
        run: python3 scripts/validate-yaml.py

      - name: Validate Kubernetes manifests
        run: kubeconform -kubernetes-version 1.30.0 -strict \
          infrastructure/kubernetes/namespaces/*.yaml \
          infrastructure/kubernetes/rbac/*.yaml \
          infrastructure/kubernetes/network-policies/*.yaml \
          infrastructure/kubernetes/service-account.yaml

      - name: Validate Prometheus config + rules
        run: |
          promtool check rules infrastructure/observability/prometheus/rules/archtech-alerts.yml
          promtool check config infrastructure/observability/prometheus/prometheus.yml

      - name: ShellCheck
        run: |
          shellcheck -x -S error scripts/*.sh scripts/tests/*.sh infrastructure/vault/scripts/*.sh 2>/dev/null
          echo "ShellCheck completed"

      - name: Check DDEV logs on failure
        if: failure()
        run: ddev logs --tail=50

  zap:
    name: OWASP ZAP Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and start Next.js
        working-directory: frontend
        run: |
          npm run build
          npm run start &
          for i in $(seq 1 30); do curl -s http://localhost:3000 > /dev/null 2>&1 && break; sleep 1; done
          echo "Next.js ready on :3000"

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12
        with:
          target: 'http://localhost:3000'
          cmd_options: '-a -j'
          allow_issue_writing: false
