name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'web/**'
      - 'config/**'
      - 'recipes/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - 'config/**'
      - 'recipes/**'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (PHPStan + PHPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, pdo_pgsql, redis

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: PHPStan
        run: |
          composer require --dev phpstan/phpstan phpstan/extension-installer
          vendor/bin/phpstan analyse web/modules/custom --level=8 --no-progress || true

      - name: PHPCS (Drupal standards)
        run: |
          composer require --dev drupal/coder
          vendor/bin/phpcs --standard=Drupal --extensions=php,module,inc,install,test,profile,theme,css,info,txt,md web/modules/custom --ignore=*/node_modules/* || true

  sast:
    name: SAST (Snyk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snyk Scan
        uses: snyk/actions/php@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  api-lint:
    name: API Lint (Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Spectral Lint
        uses: stoplightio/spectral-action@v0.8.3
        with:
          file_glob: 'docs/api-specifications/**/*.yaml'
          spectral_ruleset: .spectral.yaml

  test:
    name: PHPUnit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: db
          POSTGRES_PASSWORD: db
          POSTGRES_DB: db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pgsql, pdo_pgsql, redis

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run PHPUnit
        run: |
          mkdir -p /tmp/web
          php vendor/bin/phpunit --coverage-clover=coverage.xml --log-junit=junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: backend
          fail_ci_if_error: true

      - name: Check coverage threshold
        run: |
          COVERAGE=$(php -r "
            \$xml = simplexml_load_file('coverage.xml');
            \$metrics = \$xml->project->metrics;
            echo (float)\$metrics['coveredstatements'] / (float)\$metrics['statements'] * 100;
          ")
          echo "Code coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below threshold of 80%"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets threshold of 80%"

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, sast, test, api-lint]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.drupal
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/drupal:${{ github.sha }}
            ghcr.io/${{ github.repository }}/drupal:${{ github.ref_name == 'main' && 'latest' || 'develop' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Helm
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "namespace=archtech-staging" >> $GITHUB_OUTPUT
            echo "values=infrastructure/kubernetes/helm/values-staging.yaml" >> $GITHUB_OUTPUT
          else
            echo "namespace=archtech-dev" >> $GITHUB_OUTPUT
            echo "values=infrastructure/kubernetes/helm/values-dev.yaml" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Helm chart
        uses: bitovi/github-actions-deploy-helm-kubernetes@v1
        with:
          namespace: ${{ steps.env.outputs.namespace }}
          release: archnet
          chart: infrastructure/kubernetes/helm
          values: ${{ steps.env.outputs.values }}
          kubeconfig: ${{ secrets.KUBECONFIG }}
          set: |
            image.tag=${{ github.sha }}
            image.repository=ghcr.io/${{ github.repository }}/drupal
