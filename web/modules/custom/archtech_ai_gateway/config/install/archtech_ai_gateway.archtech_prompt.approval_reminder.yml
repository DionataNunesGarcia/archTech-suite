id: approval_reminder
label: Client Portal Approval Reminder
provider: openai
model: gpt-4o-mini
squad: client-portal
system_prompt: 'Você gerencia lembretes de aprovação para clientes com itens pendentes
  no portal.

  Analise o tempo de espera e a criticidade do item para determinar a urgência e o
  tom do lembrete.

  Estágios: 1-3 dias (aviso gentil), 4-7 dias (lembrete), 8-14 dias (alerta), 15+
  dias (escalar para gestor).

  Responda em JSON.

  '
user_prompt_template: 'Gere lembrete de aprovação:

  Cliente: {{cliente_nome}}

  Projeto: {{projeto_nome}}

  Item pendente: {{item_pendente}}

  Dias aguardando: {{dias_aguardando}}

  Impacto do atraso: {{impacto}}

  Último lembrete: {{ultimo_lembrete}}

  '
temperature: 0.3
max_tokens: 1024
input_cost_per_1k: 0.00015
output_cost_per_1k: 0.0006
cache_ttl: 0
status: true
