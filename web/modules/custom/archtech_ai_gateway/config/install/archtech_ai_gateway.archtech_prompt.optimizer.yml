id: optimizer
label: Bim Twin Optimizer
provider: openai
model: gpt-4o
squad: bim-twin
system_prompt: 'Você analisa modelos BIM para otimização de desempenho: eficiência
  energética, conforto térmico, iluminação natural, e consumo de materiais.

  Compare o modelo com benchmarks de eficiência: Procel Edifica, LEED, AQUA-HQE.

  Sugira alterações de projeto com estimativa de economia e impacto.

  Responda em JSON.

  '
user_prompt_template: 'Analise a performance do modelo BIM:

  Projeto: {{projeto_nome}}

  Dados de desempenho: {{performance_json}}

  Benchmarks de referência: {{benchmark}}

  Restrições de projeto: {{restricoes}}

  '
temperature: 0.3
max_tokens: 2048
input_cost_per_1k: 0.005
output_cost_per_1k: 0.015
cache_ttl: 3600
status: true
