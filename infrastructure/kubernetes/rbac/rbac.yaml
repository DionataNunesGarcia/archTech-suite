# Cluster Role for platform team (full access to archtech namespaces)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: archtech-platform-admin
rules:
  - apiGroups: ['']
    resources: ['pods', 'services', 'configmaps', 'secrets', 'persistentvolumeclaims']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['apps']
    resources: ['deployments', 'statefulsets', 'daemonsets']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['networking.k8s.io']
    resources: ['networkpolicies', 'ingresses']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['autoscaling']
    resources: ['horizontalpodautoscalers']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['rbac.authorization.k8s.io']
    resources: ['roles', 'rolebindings']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']

---
# Cluster Role for read-only view
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: archtech-viewer
rules:
  - apiGroups: ['']
    resources: ['pods', 'services', 'configmaps', 'endpoints']
    verbs: ['get', 'list', 'watch']
  - apiGroups: ['apps']
    resources: ['deployments', 'statefulsets']
    verbs: ['get', 'list', 'watch']

---
# Cluster Role for CI/CD (ArgoCD / GitHub Actions)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: archtech-cicd
rules:
  - apiGroups: ['']
    resources: ['pods', 'services', 'configmaps', 'secrets']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['apps']
    resources: ['deployments', 'statefulsets']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['networking.k8s.io']
    resources: ['networkpolicies', 'ingresses']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['autoscaling']
    resources: ['horizontalpodautoscalers']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']
  - apiGroups: ['batch']
    resources: ['jobs', 'cronjobs']
    verbs: ['get', 'list', 'watch', 'create', 'update', 'patch', 'delete']


# Bind platform admin to platform team in each namespace
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: archtech-platform-admin-binding
  namespace: archtech-dev
subjects:
  - kind: Group
    name: archtech-platform
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: archtech-platform-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: archtech-platform-admin-binding
  namespace: archtech-staging
subjects:
  - kind: Group
    name: archtech-platform
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: archtech-platform-admin
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: archtech-platform-admin-binding
  namespace: archtech-prod
subjects:
  - kind: Group
    name: archtech-platform
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: archtech-platform-admin
  apiGroup: rbac.authorization.k8s.io


# Bind CI/CD role for GitHub Actions
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: archtech-cicd-binding
  namespace: archtech-dev
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: archtech-dev
roleRef:
  kind: ClusterRole
  name: archtech-cicd
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: archtech-cicd-binding
  namespace: archtech-staging
subjects:
  - kind: ServiceAccount
    name: github-actions
    namespace: archtech-staging
roleRef:
  kind: ClusterRole
  name: archtech-cicd
  apiGroup: rbac.authorization.k8s.io
