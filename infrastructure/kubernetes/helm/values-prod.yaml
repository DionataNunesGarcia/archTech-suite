# ArchTech Suite — Production values
replicaCount: 3

image:
  pullPolicy: Always

ingress:
  enabled: true
  host: api.archtech.com.br
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: '100m'
    nginx.ingress.kubernetes.io/enable-cors: 'true'
    nginx.ingress.kubernetes.io/cors-allow-origin: 'https://app.archtech.com.br'
  tls:
    - hosts:
        - api.archtech.com.br
      secretName: archtech-prod-tls

resources:
  requests:
    memory: '512Mi'
    cpu: '500m'
  limits:
    memory: '2Gi'
    cpu: '1'

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 2

postgresql:
  enabled: false

redis:
  enabled: false

rabbitmq:
  enabled: false

drupal:
  existingSecret: archtech-prod-secrets
  livenessProbe:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 5

nodeSelector:
  workload: production

tolerations:
  - key: 'workload'
    operator: 'Equal'
    value: 'production'
    effect: 'NoSchedule'

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - archnet
          topologyKey: kubernetes.io/hostname
