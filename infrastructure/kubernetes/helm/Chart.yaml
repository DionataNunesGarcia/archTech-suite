apiVersion: v2
name: archnet
description: ArchTech Suite - Helm chart for Drupal backend deployment
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: postgresql
    version: ~15.0
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: postgresql.enabled
  - name: redis
    version: ~19.0
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  - name: rabbitmq
    version: ~14.0
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: rabbitmq.enabled
  - name: n8n
    version: ~1.0.0
    repository: file://../../n8n
    condition: n8n.enabled
