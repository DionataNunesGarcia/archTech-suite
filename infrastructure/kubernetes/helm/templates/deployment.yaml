apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "archnet.fullname" . }}
  labels:
    {{- include "archnet.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "archnet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "archnet.selectorLabels" . | nindent 8 }}
        tier: platform
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "archnet.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.drupal.existingSecret | default (include "archnet.fullname" .) }}
                  key: database-url
            - name: DRUPAL_HASH_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.drupal.existingSecret | default (include "archnet.fullname" .) }}
                  key: hash-salt
            {{- if .Values.redis.enabled }}
            - name: REDIS_HOST
              value: {{ .Release.Name }}-redis-master
            - name: REDIS_PORT
              value: "6379"
            {{- end }}
            {{- if .Values.rabbitmq.enabled }}
            - name: RABBITMQ_HOST
              value: {{ .Release.Name }}-rabbitmq
            - name: RABBITMQ_PORT
              value: "5672"
            {{- end }}
            - name: TRUSTED_HOST_PATTERNS
              value: "^{{ .Values.ingress.host | default "localhost" }}$|.*"
            {{- with .Values.drupal.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.drupal.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.drupal.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.drupal.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.drupal.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.drupal.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.drupal.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
