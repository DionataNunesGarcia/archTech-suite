[server]
domain = grafana.archtech.ddev.site
root_url = https://grafana.archtech.ddev.site

[security]
admin_user = admin
admin_password = admin

[auth.anonymous]
enabled = false

[auth.basic]
enabled = true

[users]
default_language = pt-BR

[alerting]
enabled = true
execute_alerts = true

[unified_alerting]
enabled = true

[dashboards]
default_home_dashboard_path = /etc/grafana/dashboards/archtech-overview.json

[explore]
enabled = true

[log]
mode = console
level = info
