receivers:
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_CRITICAL_KEY}'
        severity: critical
        urgency: high
        client: 'ArchTech Suite'
        client_url: 'https://archtech.com.br'
        description: '{{ .GroupLabels.alertname }}'
        severity: '{{ .CommonLabels.severity }}'
        images:
          - src: 'https://grafana.archtech.com.br/avatar.png'
            alt: 'ArchTech Suite'

  - name: 'pagerduty-warning'
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_WARNING_KEY}'
        severity: warning
        urgency: low
        client: 'ArchTech Suite'
        client_url: 'https://archtech.com.br'
        description: '{{ .GroupLabels.alertname }}'

  - name: 'slack-alerts'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#archtech-alerts'
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ .CommonAnnotations.description }}'
        footer: 'ArchTech Suite Alertmanager'
        color: '{{ if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}'
        fields:
          - title: 'Squad'
            value: '{{ .CommonLabels.squad }}'
            short: true
          - title: 'Severity'
            value: '{{ .CommonLabels.severity }}'
            short: true
          - title: 'Summary'
            value: '{{ .CommonAnnotations.summary }}'
            short: false

route:
  receiver: 'slack-alerts'
  group_by: ['alertname', 'squad', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - receiver: 'pagerduty-critical'
      matchers:
        - severity = critical
      continue: true
    - receiver: 'pagerduty-warning'
      matchers:
        - severity = warning
      continue: true
    - receiver: 'slack-alerts'
      matchers:
        - severity =~ "critical|warning"
      continue: false

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'squad']

templates:
  - '/etc/alertmanager/templates/*.tmpl'
