# Prometheus config for local DDEV environment
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'postgres-exporter'
    static_configs:
      - targets:
        - postgres-exporter:9187

  - job_name: 'redis-exporter'
    static_configs:
      - targets:
        - redis-exporter:9121

  - job_name: 'rabbitmq'
    static_configs:
      - targets:
        - rabbitmq-exporter:9419

  - job_name: 'jaeger'
    static_configs:
      - targets:
        - jaeger:14269
