groups:
  - name: archtech-alerts
    interval: 30s

    rules:
      # High priority alerts
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
          squad: platform
        annotations:
          summary: 'High HTTP 5xx error rate ({{ $value | humanizePercentage }})'
          description: 'Error rate is {{ $value | humanizePercentage }} for the last 5 minutes.'

      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
          squad: platform
        annotations:
          summary: 'Service {{ $labels.instance }} is down'
          description: 'Instance {{ $labels.instance }} has been unreachable for 2 minutes.'

      - alert: RabbitMQQueueDepth
        expr: rabbitmq_queue_messages_ready > 10000
        for: 5m
        labels:
          severity: warning
          squad: platform
        annotations:
          summary: 'RabbitMQ queue depth high ({{ $value }})'
          description: 'Queue {{ $labels.queue }} has {{ $value }} ready messages.'

      - alert: RabbitMQDLQNonEmpty
        expr: rabbitmq_queue_messages{queue=~".*dlq.*"} > 10
        for: 2m
        labels:
          severity: critical
          squad: platform
        annotations:
          summary: 'Dead Letter Queue has messages'
          description: 'DLQ {{ $labels.queue }} has {{ $value }} messages. Investigate consumer failures.'

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.85
        for: 5m
        labels:
          severity: warning
          squad: platform
        annotations:
          summary: 'High memory usage ({{ $value | humanizePercentage }})'
          description: 'Container {{ $labels.container }} is using {{ $value | humanizePercentage }} of memory limit.'

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota > 0.80
        for: 10m
        labels:
          severity: warning
          squad: platform
        annotations:
          summary: 'High CPU usage ({{ $value | humanizePercentage }})'
          description: 'Container {{ $labels.container }} CPU usage is at {{ $value | humanizePercentage }}.'

      - alert: DatabaseConnectionsHigh
        expr: pg_stat_activity_count > 50
        for: 5m
        labels:
          severity: warning
          squad: platform
        annotations:
          summary: 'High database connections ({{ $value }})'
          description: 'PostgreSQL has {{ $value }} active connections.'

      - alert: P99LatencyHigh
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          squad: platform
        annotations:
          summary: 'P99 latency high ({{ $value }}s)'
          description: 'P99 response time is {{ $value }}s, exceeding SLO of 500ms.'

      - alert: DiskSpaceLow
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes < 0.15
        for: 5m
        labels:
          severity: warning
          squad: platform
        annotations:
          summary: 'Disk space low ({{ $value | humanizePercentage }} free)'
          description: 'Filesystem {{ $labels.mountpoint }} has {{ $value | humanizePercentage }} free space.'

      - alert: CertificateExpiring
        expr: (certmanager_certificate_expiration_timestamp_seconds - time()) < 86400 * 14
        for: 1h
        labels:
          severity: warning
          squad: platform
        annotations:
          summary: 'TLS certificate expiring in {{ $value | humanizeDuration }}'
          description: 'Certificate {{ $labels.name }} expires in {{ $value | humanizeDuration }}.'
