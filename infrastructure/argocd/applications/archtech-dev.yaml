apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arctech-dev
  namespace: argocd
spec:
  project: arctech
  source:
    repoURL: https://github.com/DionataNunesGarcia/drupal-recipes-base
    targetRevision: develop
    path: infrastructure/kubernetes/helm
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    namespace: arctech-dev
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
