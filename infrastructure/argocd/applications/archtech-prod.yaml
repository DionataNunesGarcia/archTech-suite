apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arctech-prod
  namespace: argocd
spec:
  project: arctech
  source:
    repoURL: https://github.com/DionataNunesGarcia/drupal-recipes-base
    targetRevision: main
    path: infrastructure/kubernetes/helm
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    namespace: arctech-prod
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 10m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
