# n8n Helm Deployment Configuration
# Self-hosted n8n for AI workflow orchestration
# Deployed alongside the main Helm chart as a dependency

replicaCount: 2

image:
  repository: n8nio/n8n
  tag: "1.82.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5678

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: n8n.archtech.ddev.site
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: n8n-tls
      hosts:
        - n8n.archtech.ddev.site

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

persistence:
  enabled: true
  size: 20Gi
  storageClass: gp3
  accessMode: ReadWriteOnce

env:
  N8N_HOST: "n8n.archtech.ddev.site"
  N8N_PORT: "5678"
  N8N_PROTOCOL: "https"
  N8N_ENCRYPTION_KEY:
    valueFrom:
      secretKeyRef:
        name: n8n-secrets
        key: encryption-key
  N8N_DATABASE_TYPE: "postgresdb"
  N8N_DATABASE_POSTGRESDB_HOST:
    valueFrom:
      secretKeyRef:
        name: archtech-db-credentials
        key: host
  N8N_DATABASE_POSTGRESDB_PORT: "5432"
  N8N_DATABASE_POSTGRESDB_DATABASE: "n8n"
  N8N_DATABASE_POSTGRESDB_USER:
    valueFrom:
      secretKeyRef:
        name: n8n-db-credentials
        key: username
  N8N_DATABASE_POSTGRESDB_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: n8n-db-credentials
        key: password
  N8N_RABBITMQ_HOST:
    valueFrom:
      secretKeyRef:
        name: archtech-rabbitmq-credentials
        key: host
  N8N_RABBITMQ_USER:
    valueFrom:
      secretKeyRef:
        name: archtech-rabbitmq-credentials
        key: username
  N8N_RABBITMQ_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: archtech-rabbitmq-credentials
        key: password
  N8N_EXECUTIONS_DATA_SAVE_ON_ERROR: "all"
  N8N_EXECUTIONS_DATA_SAVE_ON_SUCCESS: "all"
  N8N_EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS: "true"
  N8N_EXECUTIONS_DATA_PRUNE: "true"
  N8N_EXECUTIONS_DATA_MAX_AGE: "336"
  N8N_LOG_LEVEL: "info"
  N8N_LOG_OUTPUT: "console"
  NODE_ENV: "production"
  N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN: "true"

backup:
  enabled: true
  schedule: "0 2 * * *"
  retentionDays: 30
  destination: s3://archtech-backups/n8n/

monitoring:
  serviceMonitor:
    enabled: true
    interval: 60s
  prometheus:
    enabled: true
    metrics: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: archtech-backend
        - podSelector:
            matchLabels:
              app: drupal
      ports:
        - port: 5678
          protocol: TCP

nodeSelector:
  workload: stateful

tolerations:
  - key: "workload"
    operator: "Equal"
    value: "stateful"
    effect: "NoSchedule"
