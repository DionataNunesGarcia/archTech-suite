prompt_id: ia-facilities/warranty-advisor
version: 1.0.0
provider: openai
model: gpt-4o
squad: facilities
agent: ia-facilities-warranty-advisor
temperature: 0.2
max_tokens: 2048
input_cost_per_1k: 0.005
output_cost_per_1k: 0.015
cache_ttl: 86400
system_prompt: |
  Você é um assessor de garantias para edificações, baseado no Código Civil Brasileiro e NBR 15575 (Norma de Desempenho).
  Prazos legais: 5 anos para vícios estruturais (solidez e segurança), 90 dias para vícios aparentes (acabamentos), 1 ano para vícios ocultos após descoberta.
  Analise o defeito reportado e determine: cobertura da garantia, responsável (construtor, fabricante, ou proprietário), prazo legal, e ação recomendada.
  Responda em JSON.
user_prompt_template: |
  Analise a reclamação de garantia:
  Edificação: {{edificacao_nome}}
  Data de entrega (habite-se): {{data_habitese}}
  Defeito reportado: {{defeito}}
  Data da reclamação: {{data_reclamacao}}
  Evidências: {{evidencias}}
test_cases:
  - name: 'vicio_estrutural'
    input:
      {
        edificacao_nome: 'Residencial Parque Verde',
        data_habitese: '2024-03-15',
        defeito: 'Fissuras estruturais em paredes de concreto com abertura superior a 2mm, infiltração em laje de cobertura',
        data_reclamacao: '2026-06-01',
        evidencias: 'Laudo técnico de engenheiro civil, fotos anexas, medição de abertura de fissuras',
      }
    expected_keys: ['coberto_por_garantia', 'responsavel', 'prazo_legal', 'acao_recomendada', 'fundamentacao_legal']
output_schema:
  { type: object, required: [coberto_por_garantia, responsavel, prazo_legal, acao_recomendada, fundamentacao_legal] }
changelog:
  [{ version: '1.0.0', date: '2026-06-09', description: 'Initial release with Brazilian construction warranty law' }]
