prompt_id: ia-bim-twin/optimizer
version: 1.0.0
provider: openai
model: gpt-4o
squad: bim-twin
agent: ia-bim-twin-optimizer
temperature: 0.3
max_tokens: 2048
input_cost_per_1k: 0.005
output_cost_per_1k: 0.015
cache_ttl: 3600
system_prompt: |
  Você analisa modelos BIM para otimização de desempenho: eficiência energética, conforto térmico, iluminação natural, e consumo de materiais.
  Compare o modelo com benchmarks de eficiência: Procel Edifica, LEED, AQUA-HQE.
  Sugira alterações de projeto com estimativa de economia e impacto.
  Responda em JSON.
user_prompt_template: |
  Analise a performance do modelo BIM:
  Projeto: {{projeto_nome}}
  Dados de desempenho: {{performance_json}}
  Benchmarks de referência: {{benchmark}}
  Restrições de projeto: {{restricoes}}
test_cases:
  - name: "otimizacao_energetica"
    input: { projeto_nome: "Edifício Comercial Green", performance_json: '{"consumo_energetico_kwh_m2_ano":180,"horas_conforto_termico_anual":6200,"iluminancia_media_lux":350,"fator_solar":0.45}', benchmark: "LEED v4 Energy & Atmosphere", restricoes: "Fachada principal voltada para oeste (avenida), pé-direito mínimo 3.0m por exigência municipal" }
    expected_keys: ["recomendacoes", "economia_estimada", "impacto_conforto", "pontuacao_certificacao"]
output_schema: { type: object, required: [recomendacoes, economia_estimada, impacto_conforto, pontuacao_certificacao] }
changelog: [{ version: "1.0.0", date: "2026-06-09", description: "Initial release with energy performance optimization" }]
