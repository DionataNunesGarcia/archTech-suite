prompt_id: ia-crm/lead-scorer
version: 1.0.0
provider: openai
model: gpt-4o-mini
squad: crm
agent: ia-crm-lead-scorer
temperature: 0.3
max_tokens: 1024
input_cost_per_1k: 0.00015
output_cost_per_1k: 0.0006
cache_ttl: 300
system_prompt: |
  Você é um especialista em qualificação comercial para escritórios de arquitetura.
  Analise leads com base em fit (adequação ao perfil do escritório), budget (orçamento),
  urgência (prazo) e perfil do contato. Atribua uma pontuação de 1 a 10.

  Critérios de scoring:
  - Tipo de projeto (residencial alto padrão: +3, comercial corporativo: +2, reforma simples: +1)
  - Orçamento declarado (>R$500K: +3, R$100K-500K: +2, <R$100K: +1)
  - Urgência (imediato: +2, 30-60 dias: +1, >60 dias: 0)
  - Canal de origem (indicação: +2, site/SEO: +1, redes sociais: 0)
  Score máximo: 10

  Responda SOMENTE em JSON com as chaves: score (int), justificativa (string), fatores (array de strings), acoes_sugeridas (array de strings).

user_prompt_template: |
  Avalie o lead com os seguintes dados:
  - Nome: {{lead_nome}}
  - Tipo de projeto: {{tipo_projeto}}
  - Orçamento estimado: {{orcamento_range}}
  - Prazo desejado: {{prazo_desejado}}
  - Fonte do lead: {{fonte}}
  - Descrição: {{descricao}}

few_shot_examples:
  - input:
      lead_nome: 'Carlos Silva'
      tipo_projeto: 'Residencial Alto Padrão'
      orcamento_range: '>R$500K'
      prazo_desejado: 'Imediato'
      fonte: 'Indicação'
      descricao: 'Deseja construir casa de 500m² em condomínio fechado'
    output: |
      {"score":10,"justificativa":"Lead excelente: projeto residencial alto padrão com orçamento elevado, urgência imediata e origem por indicação. Perfil ideal para o escritório.","fatores":["Projeto residencial alto padrão","Orçamento >R$500K","Urgência imediata","Origem por indicação"],"acoes_sugeridas":["Agendar reunião em até 24h","Preparar portfólio de projetos similares","Designar arquiteto sênior para atendimento"]}
  - input:
      lead_nome: 'Maria Souza'
      tipo_projeto: 'Reforma Simples'
      orcamento_range: '<R$100K'
      prazo_desejado: '>60 dias'
      fonte: 'Redes Sociais'
      descricao: 'Reforma de cozinha e banheiro em apartamento'
    output: |
      {"score":2,"justificativa":"Lead de baixo potencial: reforma simples com orçamento limitado e prazo longo. Pode ser atendido por equipe júnior ou redirecionado.","fatores":["Reforma simples","Orçamento <R$100K","Prazo longo","Origem redes sociais"],"acoes_sugeridas":["Enviar material informativo por email","Agendar follow-up em 30 dias","Avaliar redirecionamento para parceiro"]}

test_cases:
  - name: 'lead_alto_potencial'
    input:
      lead_nome: 'Empresa Construtora XYZ'
      tipo_projeto: 'Comercial Corporativo'
      orcamento_range: '>R$500K'
      prazo_desejado: 'Imediato'
      fonte: 'Indicação'
      descricao: 'Projeto de sede corporativa 2000m²'
    expected_keys: ['score', 'justificativa', 'fatores', 'acoes_sugeridas']
    expected_values:
      score: 9
  - name: 'lead_baixo_potencial'
    input:
      lead_nome: 'João Santos'
      tipo_projeto: 'Reforma Simples'
      orcamento_range: '<R$100K'
      prazo_desejado: '>60 dias'
      fonte: 'Redes Sociais'
      descricao: 'Pintura de parede externa'
    expected_keys: ['score', 'justificativa', 'fatores', 'acoes_sugeridas']

output_schema:
  type: object
  required: [score, justificativa, fatores, acoes_sugeridas]
  properties:
    score:
      type: integer
      minimum: 1
      maximum: 10
    justificativa:
      type: string
    fatores:
      type: array
      items:
        type: string
    acoes_sugeridas:
      type: array
      items:
        type: string

fallback_prompt: |
  Avalie o lead {{lead_nome}} do tipo {{tipo_projeto}} com orçamento {{orcamento_range}}.
  Atribua score de 1 a 10. Responda em JSON.

changelog:
  - version: '1.0.0'
    date: '2026-06-09'
    description: 'Initial release with scoring criteria and few-shot examples'
